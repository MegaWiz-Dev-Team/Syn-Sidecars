# 🚪 Syn-Sidecars — Build & Push paddleocr + chandra images to ghcr.io
# Polyrepo CI pattern (org-wide standard)

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: syn-paddleocr-sidecar, context: ./services/paddleocr-sidecar }
          - { name: syn-chandra-sidecar, context: ./services/chandra-sidecar }
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/megawiz-dev-team/${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/megawiz-dev-team/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  ci-success:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.build.result }}" != "success" ]; then echo "❌"; exit 1; fi
          echo "✅"
